startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      repoPath:
        type: string
        description: Absolute path to your local clone of rails-agent-skills
        default: ""
    required:
      - repoPath
  commandFunction: |-
    (config) => ({
      command: "bundle",
      args: [
        "exec",
        "ruby",
        config.repoPath + "/mcp_server/server.rb"
      ],
      env: {
        BUNDLE_GEMFILE: config.repoPath + "/mcp_server/Gemfile"
      }
    })
